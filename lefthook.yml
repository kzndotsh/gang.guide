pre-commit:
  parallel: true
  commands:
    ruff-check:
      glob: "**/*.py"
      run: ruff check --config apps/pipeline/pyproject.toml {staged_files}
    update-stats:
      glob: "data/**/*.json"
      run: python3 scripts/update-readme-stats.py && git add README.md

pre-push:
  commands:
    svelte-check:
      glob: "apps/web/**/*.{svelte,ts}"
      run: cd apps/web && npx svelte-kit sync && npm run check

commit-msg:
  commands:
    commitlint:
      run: npx commitlint --edit {1}
