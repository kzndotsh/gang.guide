[pytest]
testpaths = apps/pipeline/tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = --import-mode=importlib --strict-markers --tb=short --durations=10 -m "not slow and not api"
timeout = 30
markers =
    unit: unit tests with isolated components (fast, no I/O)
    slow: slow-running tests (>5 seconds, e2e)
    api: tests requiring LLM API keys
    network: tests requiring network access
filterwarnings =
    ignore::DeprecationWarning
norecursedirs = .git .venv __pycache__ build dist node_modules .alchemy
